<li class="carroussel__item" onclick="C.handlerDetail('{{id}}')">
  <figure class="card">
    <div class="img__container">
      <img class="img__container--image" src="{{image}}" alt="preview" />
    </div>
    <figcaption class="card__desc">
      <h3 class="cards__title">{{title}}</h3>
    </figcaption>
  </figure>
</li>
