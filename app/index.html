<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <script type="module">
      import { DataMovie } from "./data/dataMovie.js";

      import { NavBar } from "./component/NavBar/script.js";
      import { Carrousel } from "./component/Carrousel/script.js";
      import { MovieCard } from "./component/MovieCard/script.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";

      let data = await DataMovie.requestMovies();

      // Controleur
      // Rappel, écrire window.C plutôt que let C est nécessaire pour tester depuis la console du navigateur
      // Une fois l'application terminée, on pourrait remettre let C.
      window.C = {};

      C.handlerAbout = function () {
        alert(
          "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !",
        );
      };

      C.handlerHome = async function () {
        window.location.reload();
      };

      C.handlerDetail = async function (id) {
        let movieData = await DataMovie.requestMoviesDetails(id);
        let html = MovieDetail.format(movieData);
        let zonePrincipale = document.querySelector("#content");
        zonePrincipale.innerHTML = html;
      };

      C.handlerHomeCategories = async function () {
        const categories = await DataMovie.requestCategories();
        const allMovies = await DataMovie.requestMovies();
        V.renderMovieCategory({
          categories: categories,
          movies: allMovies,
        });
      };

      C.start = function () {
        V.renderNavBar("C.handlerAbout()");
        C.handlerHomeCategories();
      };

      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      /**
       * V.renderNavBar
       *
       * Cette fonction est responsable de l'affichage de la barre de navigation (NavBar).
       * Elle sélectionne l'élément HTML avec l'ID "header" et y insère le contenu
       * formaté par le composant NavBar.
       */
      V.renderNavBar = function (hAbout) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hAbout);
      };

      V.renderCarrousel = function (data, css = "") {
        let carrousel = document.querySelector("#content");
        carrousel.innerHTML = Carrousel.format(data, css);
      };

      V.renderMovieDetail = function (hDetail, css = "") {
        let detail = document.querySelector("#content");
        detail.innerHTML = MovieDetail.format(hDetail, css);
      };

      V.renderMovieCategory = function (data) {
        let htmlGlobal = "";
        for (const cat of data.categories) {
          const filteredMovies = data.movies.filter((m) => m.id_category === cat.id);
          if (filteredMovies.length > 0) {
            let moviesCardsHtml = "";
            for (const movie of filteredMovies) {
              moviesCardsHtml += MovieCard.format(movie);
            }
            htmlGlobal += MovieCategory.format(cat.name, moviesCardsHtml);
          }
        }
        let zonePrincipale = document.querySelector("#content");
        zonePrincipale.innerHTML = htmlGlobal;
      };

      C.start(); // Démarre l'application
    </script>
  </body>
</html>
<script type="module"></script>
