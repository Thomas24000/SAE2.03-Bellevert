<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <script type="module">
      import { DataMovie } from "./data/dataMovie.js";
      import { DataProfile } from "./data/dataProfile.js";

      import { NavBar } from "./component/NavBar/script.js";
      import { Carrousel } from "./component/Carrousel/script.js";
      import { MovieCard } from "./component/MovieCard/script.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";

      let data = await DataMovie.requestMovies();

      let profiles = [];
      let age_active_profile = 0;
      let id_active_profile = null;

      // Controleur
      // Rappel, écrire window.C plutôt que let C est nécessaire pour tester depuis la console du navigateur
      // Une fois l'application terminée, on pourrait remettre let C.
      window.C = {};

      C.handlerAbout = function () {
        alert(
          "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !",
        );
      };

      C.handlerHome = async function () {
        C.handlerHomeCategories();
      };

      C.handlerDetail = async function (id) {
        let movieData = await DataMovie.requestMoviesDetails(id);
        let isFavorite = false;
        if (id_active_profile) {
          let mesFavoris = await DataMovie.getFavorites(id_active_profile);
          isFavorite = mesFavoris.some((film) => film.id == id);
        }
        let html = MovieDetail.format(movieData, isFavorite);
        let zonePrincipale = document.querySelector("#content");
        zonePrincipale.innerHTML = html;
      };

      C.handlerHomeCategories = async function () {
        let data = await DataMovie.requestMovies(age_active_profile);
        let zoneAffichage = document.querySelector("#content");
        let htmlFavoris = "";
        if (id_active_profile) {
          let mesFavoris = await DataMovie.getFavorites(id_active_profile);
          
          if (mesFavoris.length > 0) {
            let cardsHtml = "";
            for (const film of mesFavoris) {
              cardsHtml += MovieCard.format(film); 
            }
            htmlFavoris = MovieCategory.format("⭐ Mes Favoris", cardsHtml);
            
          } else {
            let messageVide = `<h3 style="color:#aaa; text-align:center; padding: 20px;">Votre liste de favoris est vide. ⭐</h3>`;
            htmlFavoris = MovieCategory.format("⭐ Mes Favoris", messageVide);
          }
        }
        if (!data || !data.categories || data.categories.length === 0) {
          zoneAffichage.innerHTML = `<h2 style="text-align:center; margin-top:50px; color:white;">
              Aucun film disponible pour votre tranche d'âge. 🍿
            </h2>`;
        } else {
          V.renderMovieCategory(data);
        }
        if (htmlFavoris !== "") {
          zoneAffichage.insertAdjacentHTML("afterbegin", htmlFavoris);
        }
      };

      C.handlerSelectProfile = function () {
        let selectElement = document.querySelector(".profile-selector");
        let selectedId = parseInt(selectElement.value);
        id_active_profile = selectedId;
        let selectedProfile = profiles.find(
          (profil) => profil.id_profile === selectedId,
        );
        if (selectedProfile) {
          age_active_profile = selectedProfile.age_restriction;
        }
        C.handlerHomeCategories();
      };

      C.start = async function () {
        profiles = await DataProfile.read();
        V.renderNavBar("C.handlerAbout()", "C.handlerHome()", profiles);
        C.handlerHomeCategories();
      };

      C.handlerAddFavorite = async function (id_movie) {
        if (!id_active_profile) {
          alert("Veuillez sélectionner un profil d'abord ! 👤");
          return;
        }
        let res = await DataMovie.addFavorite(id_active_profile, id_movie);
        alert(res.message);
        C.handlerDetail(id_movie);
      };

      C.handlerRemoveFavorite = async function (id_movie) {
        if (!id_active_profile) return;

        let res = await DataMovie.removeFavorite(id_active_profile, id_movie);
        alert(res.message);

        C.handlerDetail(id_movie);
      };
      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      /**
       * V.renderNavBar
       *
       * Cette fonction est responsable de l'affichage de la barre de navigation (NavBar).
       * Elle sélectionne l'élément HTML avec l'ID "header" et y insère le contenu
       * formaté par le composant NavBar.
       */
      V.renderNavBar = function (hAbout, hHome, profiles) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hAbout, hHome, profiles);
      };

      V.renderCarrousel = function (data, css = "") {
        let carrousel = document.querySelector("#content");
        carrousel.innerHTML = Carrousel.format(data, css);
      };

      V.renderMovieDetail = function (hDetail, css = "") {
        let detail = document.querySelector("#content");
        detail.innerHTML = MovieDetail.format(hDetail, css);
      };

      V.renderMovieCategory = function (data) {
        let htmlGlobal = "";
        for (const cat of data.categories) {
          const filteredMovies = data.movies.filter(
            (m) => m.id_category === cat.id,
          );
          if (filteredMovies.length > 0) {
            let moviesCardsHtml = "";
            for (const movie of filteredMovies) {
              moviesCardsHtml += MovieCard.format(movie);
            }
            htmlGlobal += MovieCategory.format(cat.name, moviesCardsHtml);
          }
        }
        let zonePrincipale = document.querySelector("#content");
        zonePrincipale.innerHTML = htmlGlobal;
      };

      C.start(); // Démarre l'application
    </script>
  </body>
</html>
<script type="module"></script>
