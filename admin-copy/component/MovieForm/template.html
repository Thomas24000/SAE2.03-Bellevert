<div class="movie-form-container">
  <h2>Ajouter un nouveau film</h2>

  <form class="add-movie-form" onsubmit="return false;">
    <div class="form-group">
      <label for="name">Titre du film *</label>
      <input type="text" id="name" name="name" required />
    </div>

    <div class="form-group">
      <label for="director">Réalisateur *</label>
      <input type="text" id="director" name="director" required />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="year">Année de sortie *</label>
        <input
          type="number"
          id="year"
          name="year"
          min="1895"
          max="2100"
          required
        />
      </div>

      <div class="form-group">
        <label for="length">Durée (en minutes) *</label>
        <input type="number" id="length" name="length" min="1" required />
      </div>
    </div>

    <div class="form-group">
      <label for="description">Synopsis *</label>
      <textarea
        id="description"
        name="description"
        rows="4"
        required
      ></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="id_category">Catégorie *</label>
        <select class="id_category" name="id_category" required>
          <option value="">-- Choisir --</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="min_age">Restriction d'âge *</label>
      <select id="min_age" name="min_age" required>
        <option value="0">Tout public</option>
        <option value="10">- de 10 ans</option>
        <option value="12">- de 12 ans</option>
        <option value="16">- de 16 ans</option>
        <option value="18">- de 18 ans</option>
      </select>
    </div>

    <div class="form-group">
      <label for="image">Nom du fichier image *</label>
      <input
        type="text"
        id="image"
        name="image"
        placeholder="ex: interstellar.jpg"
        required
      />
    </div>

    <div class="form-group">
      <label for="trailer">URL du Trailer</label>
      <input
        type="url"
        id="trailer"
        name="trailer"
        placeholder="https://youtube.com/..."
      />
    </div>

    <button onclick="{{handler}}" type="button" class="btn-submit">
      Ajouter à la base de données
    </button>
  </form>
</div>
