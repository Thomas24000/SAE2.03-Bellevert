<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 ADMIN</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>
  <body>
    <section id="log"></section>

    <section id="movie-form"></section>

    <section id="profil-form"></section>

    <section id="edit-form"></section>

    <script type="module">
      import { Log } from "./component/Log/script.js";
      import { MovieForm } from "./component/MovieForm/script.js";
      import { AddProfil } from "./component/AddProfil/script.js";
      import { EditProfile } from "./component/EditProfile/script.js";

      import { DataMovie } from "./data/dataMovie.js";
      import { DataProfile } from "./data/dataProfile.js";

      let profiles = [];

      window.C = {};

      C.start = function () {
        V.renderLog("Démarrage de l'application");
        V.renderForm("C.handlerAddMovie()");
        V.renderFormProfil("C.handlerAddProfil()");
        V.renderEditProfil(
          "C.handlerSelectProfileToEdit()",
          "C.handlerUpdateProfile",
          profiles,
        );
        C.loadFormCategories();
      };

      C.handlerAddMovie = async function () {
        let form = document.querySelector(".add-movie-form");
        let fd = new FormData(form);
        let res = await DataMovie.add(fd);
        V.renderLog(res.message);
        if (res.success) {
          form.reset();
        }
      };

      C.handlerAddProfil = async function () {
        let form = document.querySelector(".add-profile");
        let fd = new FormData(form);
        let res = await DataProfile.add(fd);
        V.renderLog(res.message);
        if (res.success) {
          form.reset();
        }
      };

      C.loadFormCategories = async function () {
        let categories = await DataMovie.requestCategories();
        let templateOption = `<option value="{{id}}">{{nom}}</option>`;
        let toutesLesOptions = "";
        for (let categorie of categories) {
          let htmlLigne = templateOption;
          htmlLigne = htmlLigne.replaceAll("{{id}}", categorie.id);
          htmlLigne = htmlLigne.replaceAll("{{nom}}", categorie.name);
          toutesLesOptions += htmlLigne;
        }
        let selectMenu = document.querySelector(".id_category");
        selectMenu.innerHTML += toutesLesOptions;
      };

      C.selectProfileToEdit = async function () {
        
      }

      

      window.V = {};

      V.renderLog = function (txt) {
        let content = document.querySelector("#log");
        content.innerHTML = Log.format(txt);
      };

      V.renderForm = async function (handler) {
        let content = document.querySelector("#movie-form");
        content.innerHTML = await MovieForm.format(handler);
      };

      V.renderFormProfil = async function (handler) {
        let content = document.querySelector("#profil-form");
        content.innerHTML = await AddProfil.format(handler);
      };

      V.renderEditProfil = async function (hSELECT, hUPDATE, profiles) {
        let content = document.querySelector("#edit-form");
        content.innerHTML = await EditProfile.format(
          hSELECT,
          hUPDATE,
          profiles,
        );
      };

      C.start();
    </script>
  </body>
</html>
