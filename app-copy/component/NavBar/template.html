<nav class="navbar">
  <ul class="navbar__left">
    <li class="navbar__logo" onclick="{{hHome}}">Molotov.TV</li>
    <li class="navbar__item" onclick="{{hAbout}}">À propos</li>
    <li class="navbar__item" onclick="C.handlerStats()">Statistiques</li>
  </ul>

  <ul class="navbar__right">
    <li
      class="navbar__search"
      onclick="document.getElementById('searchInput').focus()"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="search-icon"
      >
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>

      <input
        type="text"
        id="searchInput"
        placeholder="Rechercher..."
        onkeyup="C.handlerSearch()"
      />
    </li>
    <li class="navbar__profile">
      <div class="profile-wrapper">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="profile-icon"
        >
          <path
            d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 3a3 3 0 1 1-3 3 3 3 0 0 1 3-3zm0 14.2a7.2 7.2 0 0 1-5.67-2.73c.04-1.89 3.78-2.92 5.67-2.92s5.63 1.03 5.67 2.92A7.2 7.2 0 0 1 12 19.2z"
          />
        </svg>
        <select class="profile-selector" onchange="C.handlerSelectProfile()">
          <option value="" disabled selected>Profil</option>
          {{profiles_options}}
        </select>
      </div>
    </li>
  </ul>
</nav>
