<div class="enavant__container">
    <img class="enavant__poster" src="{{image}}" alt="Affiche de {{name}}">
    
    <div class="enavant__content">
        <span class="enavant__badge">⭐ FILM MIS EN AVANT</span>
        <h2 class="enavant__title">{{name}}</h2>
        <p class="enavant__desc">{{description}}</p>
        
        <button class="enavant__btn" onclick="C.handlerDetail('{{id}}')">
            ▶ Plus d'infos
        </button>
    </div>
</div>
