<div class="stats-board">
    <h2 class="stats-board__title">📊 Statistiques de la plateforme</h2>
    <div class="stats-board__grid">
        
        <div class="stats-card">
            <div class="stats-card__icon">👤</div>
            <div class="stats-card__value">{{total_profiles}}</div>
            <div class="stats-card__label">Profils créés</div>
        </div>

        <div class="stats-card">
            <div class="stats-card__icon">🎬</div>
            <div class="stats-card__value">{{total_movies}}</div>
            <div class="stats-card__label">Films au catalogue</div>
        </div>

        <div class="stats-card">
            <div class="stats-card__icon">❤️</div>
            <div class="stats-card__value">{{avg_favs}}</div>
            <div class="stats-card__label">Favoris en moyenne par profil</div>
        </div>

        <div class="stats-card highlight">
            <div class="stats-card__icon">🏆</div>
            <div class="stats-card__value text-medium">{{top_movie}}</div>
            <div class="stats-card__label">Film le plus populaire</div>
        </div>

        <div class="stats-card highlight">
            <div class="stats-card__icon">🔥</div>
            <div class="stats-card__value text-medium">{{top_category}}</div>
            <div class="stats-card__label">Catégorie préférée</div>
        </div>

    </div>
</div>
