<div class="movie-card" onclick="C.handlerDetail('{{id}}')">
  <div class="movie-card__image-container">
    <img class="movie-card__image" src="{{image}}" alt="Affiche de {{title}}" />
  </div>
  <div class="movie-card__info">
    <h3 class="movie-card__title">{{title}}</h3>
    <p class="movie-card__category">FILMS - {{category}}</p>
  </div>
</div>
